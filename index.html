<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>GPAI Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f1117;
  color:white;
  font-family:'Inter',sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  padding:18px 24px;
  border-bottom:1px solid #23262f;
  font-size:22px;
  font-weight:800;
  background:#151822;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:16px;
}

.message{
  max-width:80%;
  padding:14px 16px;
  border-radius:18px;
  line-height:1.5;
  white-space:pre-wrap;
  word-wrap:break-word;
}

.user{
  align-self:flex-end;
  background:#2563eb;
}

.ai{
  align-self:flex-start;
  background:#1d2330;
}

.bottom{
  padding:18px;
  border-top:1px solid #23262f;
  display:flex;
  gap:12px;
  background:#151822;
}

textarea{
  flex:1;
  resize:none;
  border:none;
  outline:none;
  background:#1d2330;
  color:white;
  border-radius:14px;
  padding:14px;
  font-size:15px;
  height:58px;
}

button{
  border:none;
  outline:none;
  background:#2563eb;
  color:white;
  padding:0 24px;
  border-radius:14px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  opacity:.85;
}

.typing{
  opacity:.7;
  font-style:italic;
}
</style>
</head>
<body>

<header>
  GPAI Chat
</header>

<div id="chat"></div>

<div class="bottom">
  <textarea
    id="prompt"
    placeholder="Message GPAI..."
  ></textarea>

  <button onclick="send()">
    Send
  </button>
</div>

<script>
const chat = document.getElementById("chat");
const promptInput = document.getElementById("prompt");

const messages = [];

function addMessage(content, role) {
  const div = document.createElement("div");

  div.className =
    "message " + (role === "user" ? "user" : "ai");

  div.textContent = content;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

  return div;
}

async function send() {
  const prompt = promptInput.value.trim();

  if (!prompt) return;

  // Add user message
  addMessage(prompt, "user");

  messages.push({
    role: "user",
    content: prompt
  });

  promptInput.value = "";

  // Typing message
  const typing = addMessage("Thinking...", "ai");
  typing.classList.add("typing");

  try {
    const response = await fetch("/api/chat", {
      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        messages
      })
    });

    const data = await response.json();

    typing.remove();

    console.log(data);

    // Error handling
    if (data.error) {
      addMessage(
        "Error: " + JSON.stringify(data),
        "ai"
      );

      return;
    }

    // NVIDIA/OpenAI-style response
    const reply =
      data.choices?.[0]?.message?.content ||
      "No response.";

    addMessage(reply, "ai");

    messages.push({
      role: "assistant",
      content: reply
    });

  } catch (err) {
    typing.remove();

    addMessage(
      "Request failed: " + err.message,
      "ai"
    );

    console.error(err);
  }
}

// Enter to send
promptInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});
</script>

</body>
</html>
