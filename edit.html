<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nebula Eraser AI</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      background:
        radial-gradient(circle at top left, #3b1d78 0%, transparent 30%),
        radial-gradient(circle at top right, #1e3a8a 0%, transparent 30%),
        #050505;
      color: white;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .hero {
      text-align: center;
      margin-bottom: 35px;
    }

    .hero h1 {
      font-size: 58px;
      font-weight: 800;
      background: linear-gradient(90deg, #ffffff, #7c8cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .hero p {
      color: #a1a1aa;
      font-size: 17px;
    }

    .editor {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .panel {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border-radius: 28px;
      padding: 22px;
      box-shadow:
        0 0 40px rgba(0,0,0,0.5),
        inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .panel-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    textarea {
      width: 100%;
      height: 120px;
      resize: none;
      border: none;
      outline: none;
      border-radius: 18px;
      padding: 18px;
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 15px;
      margin-bottom: 18px;
    }

    textarea::placeholder {
      color: #777;
    }

    .upload-box {
      border: 2px dashed rgba(255,255,255,0.12);
      border-radius: 22px;
      padding: 35px;
      text-align: center;
      transition: 0.25s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .upload-box:hover {
      border-color: #7c8cff;
      background: rgba(124,140,255,0.08);
    }

    .upload-box input {
      position: absolute;
      width: 100%;
      height: 100%;
      opacity: 0;
      inset: 0;
      cursor: pointer;
    }

    .upload-box h3 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .upload-box p {
      color: #8b8b93;
      font-size: 14px;
    }

    .canvas-wrapper {
      margin-top: 18px;
      border-radius: 22px;
      overflow: hidden;
      background: #0d0d0d;
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
    }

    canvas {
      width: 100%;
      display: block;
      cursor: crosshair;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .tool-btn {
      flex: 1;
      min-width: 120px;
      padding: 14px;
      border: none;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }

    .erase-btn {
      background: linear-gradient(90deg, #5865F2, #7c8cff);
      color: white;
    }

    .clear-btn {
      background: rgba(255,255,255,0.06);
      color: white;
    }

    .tool-btn:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .loading {
      margin-top: 18px;
      display: none;
      color: #8b8b93;
      font-size: 15px;
    }

    .preview {
      width: 100%;
      border-radius: 22px;
      display: none;
      margin-top: 18px;
    }

    .slider-box {
      margin-top: 18px;
    }

    .slider-box label {
      display: block;
      margin-bottom: 10px;
      color: #bdbdc7;
      font-size: 14px;
    }

    input[type="range"] {
      width: 100%;
    }

    @media(max-width: 900px) {
      .editor {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="hero">
      <h1>Nebula Eraser AI</h1>
      <p>Erase objects, clean overlays, and restore images using FLUX Kontext.</p>
    </div>

    <div class="editor">

      <!-- LEFT -->
      <div class="panel">

        <div class="panel-title">
          AI Prompt
        </div>

        <textarea id="prompt" placeholder="Example: Remove the object and naturally restore the background..."></textarea>

        <div class="upload-box">
          <input type="file" id="imageInput" accept="image/*">
          <h3>Upload Image</h3>
          <p>Select an image to start editing</p>
        </div>

        <div class="slider-box">
          <label>Brush Size</label>
          <input type="range" id="brushSize" min="10" max="80" value="35">
        </div>

        <div class="toolbar">
          <button class="tool-btn erase-btn" onclick="generateImage()">
            Generate Edit
          </button>

          <button class="tool-btn clear-btn" onclick="clearMask()">
            Clear Mask
          </button>
        </div>

        <div class="loading" id="loading">
          Processing image with AI...
        </div>

      </div>

      <!-- RIGHT -->
      <div class="panel">

        <div class="panel-title">
          Eraser Mask
        </div>

        <div class="canvas-wrapper">
          <canvas id="canvas"></canvas>
        </div>

        <img id="outputImage" class="preview"/>

      </div>

    </div>
  </div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let drawing = false;
    let img = new Image();

    const imageInput = document.getElementById("imageInput");
    const brushSize = document.getElementById("brushSize");

    imageInput.addEventListener("change", (e) => {
      const file = e.target.files[0];

      if (!file) return;

      const reader = new FileReader();

      reader.onload = () => {
        img.onload = () => {

          canvas.width = img.width;
          canvas.height = img.height;

          ctx.drawImage(img, 0, 0);

        };

        img.src = reader.result;
      };

      reader.readAsDataURL(file);
    });

    function getMousePos(e) {
      const rect = canvas.getBoundingClientRect();

      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    canvas.addEventListener("mousedown", () => drawing = true);
    canvas.addEventListener("mouseup", () => drawing = false);
    canvas.addEventListener("mouseleave", () => drawing = false);

    canvas.addEventListener("mousemove", (e) => {

      if (!drawing) return;

      const pos = getMousePos(e);

      ctx.fillStyle = "rgba(255,0,0,0.45)";
      ctx.beginPath();

      ctx.arc(
        pos.x,
        pos.y,
        brushSize.value / 2,
        0,
        Math.PI * 2
      );

      ctx.fill();
    });

    function clearMask() {

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);

    }

    async function generateImage() {

      const prompt = document.getElementById("prompt").value;
      const loading = document.getElementById("loading");
      const outputImage = document.getElementById("outputImage");

      if (!prompt) {
        alert("Enter a prompt");
        return;
      }

      if (!img.src) {
        alert("Upload an image");
        return;
      }

      loading.style.display = "block";
      outputImage.style.display = "none";

      try {

        const imageData = canvas.toDataURL("image/png");

        const response = await fetch("/api/edit", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },

          body: JSON.stringify({
            prompt,
            image: imageData,
            steps: 30,
            cfg_scale: 3.5,
            seed: 0
          })
        });

        const data = await response.json();

        loading.style.display = "none";

        if (!response.ok) {
          alert(data.error || "Generation failed");
          console.error(data);
          return;
        }

        let finalImage = data.image;

        if (!finalImage.startsWith("data:image")) {
          finalImage = "data:image/png;base64," + finalImage;
        }

        outputImage.src = finalImage;
        outputImage.style.display = "block";

      } catch (err) {

        loading.style.display = "none";
        console.error(err);
        alert("Something went wrong");

      }
    }
  </script>

</body>
</html>
